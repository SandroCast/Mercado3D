<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mercado3D</title>
  <meta property="og:title" content="Mercado3D" />
  <meta property="og:description" content="O maior marketplace de impressão 3D do Brasil." />
  <meta property="og:image" content="https://mercado3d.app/og-image.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      background: #22d3ee;
      border-radius: 12px;
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 900;
      color: #0d1117;
      margin-bottom: 20px;
    }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    p  { color: #64748b; font-size: 15px; line-height: 1.5; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: #22d3ee;
      color: #0d1117;
      font-weight: 800;
      font-size: 15px;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      margin-bottom: 12px;
      width: 100%;
      max-width: 280px;
    }
    .btn-outline {
      background: transparent;
      color: #22d3ee;
      border: 1.5px solid #22d3ee;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #1e2d40;
      border-top-color: #22d3ee;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { color: #64748b; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="logo">3D</div>
  <h1>MERCADO<span style="color:#22d3ee">3D</span></h1>

  <div id="opening">
    <div class="spinner"></div>
    <p>Abrindo no app...</p>
    <div id="status">Se não abrir automaticamente, toque no botão abaixo.</div>
  </div>

  <div id="fallback" style="display:none; width:100%; max-width:280px;">
    <p>Instale o Mercado3D para ver este produto.</p>
    <a id="btn-store" href="#" class="btn">Baixar o app</a>
    <br/>
    <a id="btn-open" href="#" class="btn btn-outline" style="margin-top:8px">Já tenho o app</a>
  </div>

  <script>
    (function () {
      var params  = new URLSearchParams(window.location.search);
      var type    = params.get("type") || "";
      var id      = params.get("id")   || "";
      var deepLink = "mercado3d://product?type=" + type + "&id=" + id;

      var isAndroid = /android/i.test(navigator.userAgent);
      var isIOS     = /iphone|ipad|ipod/i.test(navigator.userAgent);

      var storeUrl = isAndroid
        ? "https://play.google.com/store/apps/details?id=com.sandrocastro.Mercado3D"
        : "https://apps.apple.com/app/mercado3d/id000000000"; // substituir pelo ID real da App Store

      document.getElementById("btn-store").href = storeUrl;
      document.getElementById("btn-open").href  = deepLink;

      // Tenta abrir o app imediatamente
      var openedAt = Date.now();
      window.location.href = deepLink;

      // Após 2s, verifica se o app abriu (se não, a página ainda está visível)
      setTimeout(function () {
        if (Date.now() - openedAt < 3000) {
          // Página ainda ativa — app não instalado
          document.getElementById("opening").style.display  = "none";
          document.getElementById("fallback").style.display = "block";
        }
      }, 2000);
    })();
  </script>
</body>
</html>
